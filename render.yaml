services:
  - type: web
    name: localhub-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: PYTHONPATH=/opt/render/project/src uvicorn app.main:app --app-dir backend --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        value: sqlite:///./localhub.db
      - key: CORS_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
